name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path xtask/Cargo.toml -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (workspace, excluding example)
        run: cargo clippy --workspace --exclude yew-sc-example --all-targets -- -D warnings
      - name: clippy (xtask)
        run: cargo clippy --manifest-path xtask/Cargo.toml --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace, excluding example)
        run: cargo test --workspace --exclude yew-sc-example --all-targets
      - name: cargo test (static-extract feature)
        run: cargo test --workspace --exclude yew-sc-example --features static-extract --all-targets
      - name: cargo test (xtask)
        run: cargo test --manifest-path xtask/Cargo.toml --all-targets

  example-build:
    name: example (wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: build example for wasm32
        run: cargo build -p yew-sc-example --target wasm32-unknown-unknown
      - name: build example with static-extract
        run: cargo build -p yew-sc-example --target wasm32-unknown-unknown --features yew-sc/static-extract
